<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio de Logise</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            background-color: #03050a; /* Fondo ultra oscuro de base */
            overflow-x: hidden; /* Evita que las animaciones generen scroll horizontal */
        }
        .stars-container {
            background-image: 
                radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.9), transparent),
                radial-gradient(1px 1px at 30% 65%, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(1.5px 1.5px at 50% 10%, rgba(255, 255, 255, 1), transparent),
                radial-gradient(1px 1px at 70% 50%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(2px 2px at 85% 30%, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(1px 1px at 95% 80%, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(1.5px 1.5px at 15% 90%, rgba(255, 255, 255, 1), transparent),
                radial-gradient(1px 1px at 60% 85%, rgba(255, 255, 255, 0.4), transparent);
            background-size: 300px 300px;
            animation: twinkle 6s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .aurora-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            opacity: 0.45;
            mix-blend-mode: screen;
            pointer-events: none;
        }
        .aurora {
            position: absolute;
            filter: blur(100px);
            border-radius: 50%;
            animation: float 20s ease-in-out infinite alternate;
        }
        .aurora-green {
            background: radial-gradient(circle, rgba(16,185,129,0.4) 0%, rgba(16,185,129,0) 70%);
            width: 80vw;
            height: 60vh;
            top: -10%;
            left: -20%;
        }
        .aurora-teal {
            background: radial-gradient(circle, rgba(6,182,212,0.3) 0%, rgba(6,182,212,0) 70%);
            width: 90vw;
            height: 50vh;
            top: 10%;
            right: -30%;
            animation-delay: -5s;
            animation-duration: 25s;
        }
        
        .aurora-purple {
            background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, rgba(139,92,246,0) 70%);
            width: 70vw;
            height: 60vh;
            top: 20%;
            left: 10%;
            animation-delay: -10s;
            animation-duration: 30s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(5%, 10%) scale(1.1) rotate(2deg); }
            66% { transform: translate(-5%, 5%) scale(0.95) rotate(-2deg); }
            100% { transform: translate(0, -5%) scale(1.05) rotate(1deg); }
        }
        @keyframes glow-animation {
            0% { box-shadow: 0 0 5px rgba(250, 204, 21, 0.4), inset 0 0 10px rgba(250, 204, 21, 0.1); }
            50% { box-shadow: 0 0 20px rgba(250, 204, 21, 0.8), inset 0 0 15px rgba(250, 204, 21, 0.2); }
            100% { box-shadow: 0 0 5px rgba(250, 204, 21, 0.4), inset 0 0 10px rgba(250, 204, 21, 0.1); }
        }
        .card-animate-glow {
            animation: glow-animation 2.5s infinite ease-in-out;
            border-color: rgba(250, 204, 21, 0.5) !important;
        }
        @keyframes card-shimmer-animation {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(250%) skewX(-20deg); }
        }
        .card-animate-shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.15) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: translateX(-150%) skewX(-20deg);
            animation: card-shimmer-animation 2s infinite linear;
            animation-delay: 0.5s;
            z-index: 5;
            pointer-events: none;
        }
        
        /* Efecto premium para las tarjetas */
        .premium-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.6));
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .premium-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="antialiased relative min-h-screen">
    <!-- Fondo Celeste Pixel-Perfect -->
    <div class="fixed inset-0 w-full h-full z-[-1] overflow-hidden bg-[#050B14]">
        <canvas id="bg-canvas" class="w-full h-full object-cover pointer-events-none opacity-0 transition-opacity duration-1000" style="image-rendering: pixelated; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges;"></canvas>
        <!-- Overlay oscuro para mejorar legibilidad y contraste -->
        <div class="absolute inset-0 bg-[#050B14]/40 pointer-events-none"></div>
    </div>

    <!-- El padding inferior (pb-32) asegura que el contenido no quede oculto detrás de la pradera -->
    <div class="container mx-auto max-w-6xl px-4 sm:px-6 py-12 md:py-16 pb-32 mb-16 relative z-10 flex flex-col items-center">
        
        <!-- Contenedor Responsivo para los 2 Anuncios -->
        <div class="w-full flex flex-col sm:flex-row justify-center items-center gap-6 mb-12">
            <!-- Anuncio 1 -->
            <div class="flex items-center justify-center bg-white/5 backdrop-blur-md border border-white/10 rounded-xl shadow-lg p-1 overflow-hidden w-full max-w-[468px] h-[68px]">
                <script type="text/javascript">
                    atOptions = {
                        'key' : '917d4a415c71dfff37fb2b4273f47380',
                        'format' : 'iframe',
                        'height' : 60,
                        'width' : 468,
                        'params' : {}
                    };
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/917d4a415c71dfff37fb2b4273f47380/invoke.js"></script>
            </div>
            <!-- Anuncio 2 -->
            <div class="flex items-center justify-center bg-white/5 backdrop-blur-md border border-white/10 rounded-xl shadow-lg p-1 overflow-hidden w-full max-w-[468px] h-[68px]">
                <script type="text/javascript">
                    atOptions = {
                        'key' : '917d4a415c71dfff37fb2b4273f47380',
                        'format' : 'iframe',
                        'height' : 60,
                        'width' : 468,
                        'params' : {}
                    };
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/917d4a415c71dfff37fb2b4273f47380/invoke.js"></script>
            </div>
        </div>

        <!-- Encabezado -->
        <header class="text-center mb-20 flex flex-col items-center w-full">
            <h1 class="text-5xl sm:text-6xl md:text-7xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-b from-white via-blue-50 to-blue-200 drop-shadow-[0_4px_12px_rgba(255,255,255,0.1)] px-4 py-2 leading-normal break-words">
                Logise
            </h1>
            <!-- Subtítulo -->
            <p class="text-xl text-blue-100/80 mt-2 font-light tracking-wide max-w-lg px-4">
                ¡Bienvenido a mi portfolio!
            </p>
            <div class="w-16 h-1 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-full mt-8 opacity-70"></div>
        </header>

        <main class="w-full">
            <!-- Sección de Proyectos -->
            <section id="proyectos" class="w-full">
                <!-- Grid de Proyectos -->
                <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 justify-items-center w-full">
                    <!-- Esqueleto de carga inicial -->
                    <div class="w-full h-64 bg-white/5 rounded-2xl animate-pulse"></div>
                    <div class="w-full h-64 bg-white/5 rounded-2xl animate-pulse"></div>
                    <div class="w-full h-64 bg-white/5 rounded-2xl animate-pulse hidden md:block"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Enlace flotante a Celeste Rooms -->
    <a href="celeste.html" class="fixed bottom-24 right-8 z-50 group flex items-center justify-center gap-2 bg-cyan-950/40 backdrop-blur-xl text-white px-6 py-3 rounded-full shadow-[0_8px_32px_rgba(0,0,0,0.4)] font-medium tracking-wide hover:bg-cyan-900/50 hover:scale-105 transition-all duration-300 border border-cyan-500/30">
        <span class="relative flex h-2.5 w-2.5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-cyan-500"></span>
        </span>
        Celeste Rooms
    </a>

    <!-- Enlace flotante lateral -->
    <a href="beme.html" class="fixed bottom-8 right-8 z-50 group flex items-center justify-center gap-2 bg-white/10 backdrop-blur-xl text-white px-6 py-3 rounded-full shadow-[0_8px_32px_rgba(0,0,0,0.4)] font-medium tracking-wide hover:bg-white/20 hover:scale-105 transition-all duration-300 border border-white/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-300 group-hover:text-cyan-300 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
        beme.html
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- STREAMING_CHUNK:Fetching and drawing Celeste pixel-art background... ---
            const bgCanvas = document.getElementById('bg-canvas');
            if (bgCanvas) {
                const ctx = bgCanvas.getContext('2d');
                const localJsonUrl = 'rooms.json';
                const remoteJsonUrl = 'https://logise1.github.io/rooms.json';

                fetch(localJsonUrl)
                    .catch(() => fetch(remoteJsonUrl))
                    .then(res => {
                        if (!res.ok) throw new Error('Failed to fetch rooms list');
                        return res.json();
                    })
                    .then(rooms => {
                        if (!rooms || rooms.length === 0) throw new Error('Rooms list is empty');
                        
                        // Elegir una habitación aleatoria
                        const randomRoom = rooms[Math.floor(Math.random() * rooms.length)];
                        const imageUrl = `https://logise1.github.io/celesterooms/${randomRoom}`;
                        
                        const img = new Image();
                        img.onload = () => {
                            const W = img.naturalWidth;
                            const H = img.naturalHeight;
                            
                            // Encontrar el factor de escala máximo de 16:9
                            const maxK = Math.floor(Math.min(W / 16, H / 9));
                            let k = Math.max(1, maxK);
                            if (maxK > 20) {
                                // Escala aleatoria entre una pantalla Celeste estándar (20 = 320x180) y la máxima posible
                                k = 20 + Math.floor(Math.random() * (maxK - 20 + 1));
                            }
                            
                            const w = 16 * k;
                            const h = 9 * k;
                            
                            // Asegurarse de que el cultivo está dentro de los límites
                            const maxX = Math.max(0, W - w);
                            const maxY = Math.max(0, H - h);
                            const sx = Math.floor(Math.random() * (maxX + 1));
                            const sy = Math.floor(Math.random() * (maxY + 1));
                            
                            // Configurar la resolución interna del lienzo para que coincida con el recorte 16:9
                            bgCanvas.width = w;
                            bgCanvas.height = h;
                            
                            // Dibujar la sección recortada sin filtrar
                            ctx.imageSmoothingEnabled = false;
                            ctx.drawImage(img, sx, sy, w, h, 0, 0, w, h);
                            
                            // Mostrar el canvas con un desvanecimiento
                            bgCanvas.classList.remove('opacity-0');
                        };
                        img.onerror = (e) => {
                            console.error('Error al cargar la imagen del fondo:', imageUrl, e);
                        };
                        img.src = imageUrl;
                    })
                    .catch(err => {
                        console.error('Error cargando el fondo:', err);
                    });
            }

            const projectGrid = document.getElementById('project-grid');

            // --- STREAMING_CHUNK:Rendering project list with object-contain to prevent image cropping... ---
            // Renderizar los proyectos
            const renderProjects = (projects) => {
                projectGrid.innerHTML = ''; 

                projects.forEach(project => {
                    let cardEffectClass = '';
                    let utilityClass = ''; 

                    if (project.tags && Array.isArray(project.tags)) {
                        const lowerCaseTags = project.tags.map(t => t.toLowerCase());
                        
                        if (lowerCaseTags.includes('shimmer')) {
                            cardEffectClass = 'card-animate-shimmer';
                            utilityClass = 'overflow-hidden';
                        } else if (lowerCaseTags.includes('glow')) {
                            cardEffectClass = 'card-animate-glow';
                        }
                    }

                    // Se ha cambiado 'object-cover' a 'object-contain' en la etiqueta <img> para que muestre la imagen entera
                    // También añadimos 'bg-slate-950/40' para que el fondo vacío tenga un tono estético integrado con la tarjeta
                    const projectCard = `
                        <a href="${project.link}" class="relative block rounded-2xl transform hover:-translate-y-3 transition-all duration-500 w-full max-w-sm premium-card group ${cardEffectClass} ${utilityClass}">
                            <div class="p-2">
                                <div class="w-full h-52 flex items-center justify-center bg-slate-950/30 rounded-xl overflow-hidden">
                                    <img src="${project.image}" alt="${project.alt}" class="max-w-full max-h-full object-contain opacity-90 group-hover:opacity-100 transition-opacity duration-300" onerror="this.onerror=null;this.src='https://placehold.co/600x400/0d1424/ffffff?text=Imagen+No+Disponible';">
                                </div>
                                
                                <div class="p-4 pt-5 pb-3">
                                    <h4 class="text-lg font-semibold text-white truncate drop-shadow-sm">${project.alt || 'Proyecto'}</h4>
                                    <div class="flex items-center justify-between mt-3">
                                        <span class="text-xs font-medium px-2.5 py-1 rounded-full bg-white/10 text-blue-200 border border-white/10 backdrop-blur-sm">Ver Proyecto</span>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 group-hover:text-white transition-colors transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                    projectGrid.innerHTML += projectCard;
                });
            };

            // --- STREAMING_CHUNK:Requesting project data from GitHub API... ---
            // Fetch JSON
            fetch('https://logise1.github.io/projects.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response error');
                    }
                    return response.json();
                })
                .then(data => {
                    renderProjects(data);
                })
                .catch(error => {
                    console.error('Error cargando proyectos:', error);
                    projectGrid.innerHTML = `
                        <div class="col-span-full flex flex-col items-center justify-center p-8 bg-red-900/20 border border-red-500/30 rounded-2xl backdrop-blur-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <p class="text-center text-red-200 font-medium">No se pudieron cargar los proyectos.</p>
                            <p class="text-center text-red-300/70 text-sm mt-1">Revisa que la URL de projects.json sea correcta.</p>
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
